# Test Configuration
spring.application.name=Bento-Test
server.port=8080
server.servlet.context-path=/bento

# Logging
logging.level.root=INFO
logging.level.gov.nih.nci.bento=DEBUG

# API Version
bento.api.version=1.0.0

# Neo4j Configuration (for integration tests)
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=password

# Elasticsearch Configuration (for integration tests)
opensearch.rest.host=localhost
opensearch.rest.port=9200

# Redis Configuration (for integration tests)
redis.enable=false
redis.host=localhost
redis.port=6379
redis.password=

# Authentication
auth.required=false
auth.token.expiry=3600

# YAML Query Configuration
query.schema.path=classpath:graphql/

# Security
security.disable=true
