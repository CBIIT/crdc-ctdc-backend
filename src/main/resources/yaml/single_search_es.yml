        - biospecimen_info.anatomical_collection_site
        - biospecimen_info.specimen_type
        - biospecimen_info.tissue_category
        - biospecimen_info.assessment_timepoint
        - data_file_uuid
        - tumor_grade
        - sex
        - race
        - ethnicity
        - carcinogen_exposure
