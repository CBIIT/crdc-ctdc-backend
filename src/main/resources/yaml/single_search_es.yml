        - diagnosisNodeData.primary_diagnosis_disease_group
        - diagnosisNodeData.primary_disease_site
        - diagnosisNodeData.snomed_disease_code
        - diagnosisNodeData.snomed_disease_term
        - diagnosisNodeData.UUID
