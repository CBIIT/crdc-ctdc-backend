      long:
        - diagnosisNodeCount
        - diagnosisParticipantCount
        - demographicNodeCount
        - demographicParticipantCount
        - exposureNodeCount
        - exposureParticipantCount
        - specimenNodeCount
        - specimenParticipantCount
        - participantStatusNodeCount
        - participantStatusParticipantCount
    initial_query:
      query: |
        MATCH (study:study)
        WITH DISTINCT study
        ORDER BY study.study_short_name
        RETURN DISTINCT
          study.study_short_name AS study_short_name,
          ['diagnosis','demographic','exposure','specimen','participant_status'] AS unique_node_types
        SKIP $skip LIMIT $limit
      page_size: 20
    update_queries:
      - name: "Diagnosis"
        query: |
          MATCH (study:study)
          WITH DISTINCT study
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (study)<-[:belongs_to]-(p_diag:participant)<-[:of_participant]-(diag:diagnosis)
          WITH study, COLLECT({node: diag, participant_id: p_diag.participant_id}) AS diag_data

          UNWIND diag_data AS diag_count_item
          WITH study, diag_data,
            COLLECT(DISTINCT CASE WHEN diag_count_item.node IS NOT NULL AND diag_count_item.participant_id IS NOT NULL THEN diag_count_item.participant_id ELSE NULL END) AS diag_participant_list

          UNWIND diag_data AS diag_item
          WITH study, diag_participant_list,
            COLLECT(DISTINCT diag_item.node) AS unique_diag, diag_data

          UNWIND unique_diag AS d
          UNWIND diag_data AS diag_item
          WITH study, d, diag_item, diag_participant_list
          WHERE diag_item.node = d AND diag_item.participant_id IS NOT NULL
          WITH study, d, COLLECT(diag_item.participant_id) AS diag_pids, diag_participant_list
          WITH study, d, diag_participant_list,
            REDUCE(result = '', item IN diag_pids |
              result + CASE WHEN result = '' THEN item ELSE '|' + item END) AS diag_participant_ids

          WITH study, COLLECT({
            participant_ids:                 diag_participant_ids,
            ctep_disease_term:               d.ctep_disease_term,
            date_of_diagnosis:               d.date_of_diagnosis,
            date_of_diagnosis_original:      d.date_of_diagnosis_original,
            date_of_diagnosis_unit:          d.date_of_diagnosis_unit,
            diagnosis_record_id:             d.diagnosis_record_id,
            histological_subtype:            d.histological_subtype,
            histology:                       d.histology,
            meddra_disease_code:             d.meddra_disease_code,
            primary_diagnosis_disease_group: d.primary_diagnosis_disease_group,
            primary_disease_site:            d.primary_disease_site,
            snomed_disease_code:             d.snomed_disease_code,
            snomed_disease_term:             d.snomed_disease_term,
            UUID:                            d.uuid
          }) AS diagnosisNodeData, diag_participant_list

          UNWIND diagnosisNodeData AS d_node_data
          WITH study, diagnosisNodeData, diag_participant_list,
            COLLECT(d_node_data.diagnosis_record_id) AS d_record_ids

          RETURN DISTINCT
            study.study_short_name AS study_short_name,
            diagnosisNodeData,
            size(d_record_ids) AS diagnosisNodeCount,
            size(diag_participant_list) AS diagnosisParticipantCount
        page_size: 10
      - name: "Demographic"
        query: |
          MATCH (study:study)
          WITH DISTINCT study
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (study)<-[:belongs_to]-(p_demo:participant)<-[:of_participant]-(demo:demographic)
          WITH study, COLLECT({node: demo, participant_id: p_demo.participant_id}) AS demo_data

          UNWIND demo_data AS demo_count_item
          WITH study, demo_data,
            COLLECT(DISTINCT CASE WHEN demo_count_item.node IS NOT NULL AND demo_count_item.participant_id IS NOT NULL THEN demo_count_item.participant_id ELSE NULL END) AS demo_participant_list

          UNWIND demo_data AS demo_item
          WITH study, demo_participant_list,
            COLLECT(DISTINCT demo_item.node) AS unique_demo, demo_data

          UNWIND unique_demo AS dm
          UNWIND demo_data AS demo_item
          WITH study, dm, demo_item, demo_participant_list
          WHERE demo_item.node = dm AND demo_item.participant_id IS NOT NULL
          WITH study, dm, COLLECT(demo_item.participant_id) AS demo_pids, demo_participant_list
          WITH study, dm, demo_participant_list,
            REDUCE(result = '', item IN demo_pids |
              result + CASE WHEN result = '' THEN item ELSE '|' + item END) AS demo_participant_ids

          WITH study, COLLECT({
            participant_ids:                 demo_participant_ids,
            age_at_enrollment:               dm.age_at_enrollment,
            age_at_enrollment_original:      dm.age_at_enrollment_original,
            age_at_enrollment_original_unit: dm.age_at_enrollment_original_unit,
            age_at_enrollment_unit:          dm.age_at_enrollment_unit,
            body_surface_area:               dm.body_surface_area,
            body_surface_area_original:      dm.body_surface_area_original,
            body_surface_area_original_unit: dm.body_surface_area_original_unit,
            body_surface_area_unit:          dm.body_surface_area_unit,
            demographic_record_id:           dm.demographic_record_id,
            ethnicity:                       dm.ethnicity,
            height:                          dm.height,
            height_original:                 dm.height_original,
            height_original_unit:            dm.height_original_unit,
            height_unit:                     dm.height_unit,
            ncbi_taxonomy_id:                dm.ncbi_taxonomy_id,
            ncbi_taxonomy_name:              dm.ncbi_taxonomy_name,
            race:                            dm.race,
            sex:                             dm.sex,
            uuid:                            dm.uuid,
            weight:                          dm.weight,
            weight_original:                 dm.weight_original,
            weight_original_unit:            dm.weight_original_unit,
            weight_unit:                     dm.weight_unit,
            occupation:                      dm.occupation,
            income:                          dm.income,
            highest_level_of_education:      dm.highest_level_of_education
          }) AS demographicNodeData, demo_participant_list

          UNWIND demographicNodeData AS dm_node_data
          WITH study, demographicNodeData, demo_participant_list,
            COLLECT(dm_node_data.demographic_record_id) AS dm_record_ids

          RETURN DISTINCT
            study.study_short_name AS study_short_name,
            demographicNodeData,
            size(dm_record_ids) AS demographicNodeCount,
            size(demo_participant_list) AS demographicParticipantCount
        page_size: 10
      - name: "Exposure"
        query: |
          MATCH (study:study)
          WITH DISTINCT study
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (study)<-[:belongs_to]-(p_exp:participant)<-[:of_participant]-(exp:exposure)
          WITH study, COLLECT({node: exp, participant_id: p_exp.participant_id}) AS exp_data

          UNWIND exp_data AS exp_count_item
          WITH study, exp_data,
            COLLECT(DISTINCT CASE WHEN exp_count_item.node IS NOT NULL AND exp_count_item.participant_id IS NOT NULL THEN exp_count_item.participant_id ELSE NULL END) AS exp_participant_list

          UNWIND exp_data AS exp_item
          WITH study, exp_participant_list,
            COLLECT(DISTINCT exp_item.node) AS unique_exp, exp_data

          UNWIND unique_exp AS e
          UNWIND exp_data AS exp_item
          WITH study, e, exp_item, exp_participant_list
          WHERE exp_item.node = e AND exp_item.participant_id IS NOT NULL
          WITH study, e, COLLECT(exp_item.participant_id) AS exp_pids, exp_participant_list
          WITH study, e, exp_participant_list,
            REDUCE(result = '', item IN exp_pids |
              result + CASE WHEN result = '' THEN item ELSE '|' + item END) AS exp_participant_ids

          WITH study, COLLECT({
            participant_ids:      exp_participant_ids,
            carcinogen_exposure:  e.carcinogen_exposure,
            exposure_record_id:   e.exposure_record_id
          }) AS exposureNodeData, exp_participant_list

          UNWIND exposureNodeData AS e_node_data
          WITH study, exposureNodeData, exp_participant_list,
            COLLECT(e_node_data.exposure_record_id) AS e_record_ids

          RETURN DISTINCT
            study.study_short_name AS study_short_name,
            exposureNodeData,
            size(e_record_ids) AS exposureNodeCount,
            size(exp_participant_list) AS exposureParticipantCount
        page_size: 10
      - name: "Specimen"
        query: |
          MATCH (study:study)
          WITH DISTINCT study
          SKIP $skip LIMIT $limit
          CALL {
            WITH study
            OPTIONAL MATCH (study)<-[:belongs_to]-(p_spec:participant)<-[:of_participant]-(spec:specimen)
            WHERE spec IS NOT NULL AND p_spec.participant_id IS NOT NULL
            RETURN COLLECT(DISTINCT p_spec.participant_id) AS spec_participant_list
          }

          CALL {
            WITH study
            OPTIONAL MATCH (study)<-[:belongs_to]-(p_spec:participant)<-[:of_participant]-(spec:specimen)
            WHERE spec IS NOT NULL AND p_spec.participant_id IS NOT NULL
            WITH study, spec, COLLECT(DISTINCT p_spec.participant_id) AS spec_pids
            WITH study, COLLECT({
              participant_ids:               REDUCE(result = '', item IN spec_pids |
                                              result + CASE WHEN result = '' THEN item ELSE '|' + item END),
              anatomical_collection_site:    spec.anatomical_collection_site,
              assessment_timepoint:          toString(spec.assessment_timepoint),
              collection_date:               toString(spec.collection_date),
              collection_date_original:      toString(spec.collection_date_original),
              collection_date_original_unit: spec.collection_date_original_unit,
              collection_date_unit:          toString(spec.collection_date_unit),
              crdc_id:                       spec.crdc_id,
              created:                       toString(spec.created),
              specimen_category:             spec.specimen_category,
              specimen_record_id:            spec.specimen_record_id,
              specimen_type_concept_code:    spec.specimen_type_concept_code,
              tissue_category:               spec.tissue_category
            }) AS specimenNodeData,
            COLLECT(DISTINCT spec.specimen_record_id) AS s_record_ids
            RETURN specimenNodeData, s_record_ids
          }

          RETURN DISTINCT
            study.study_short_name AS study_short_name,
            specimenNodeData,
            size(s_record_ids) AS specimenNodeCount,
            size(spec_participant_list) AS specimenParticipantCount
        page_size: 10
      - name: "Participant Status"
        query: |
          MATCH (study:study)
          WITH DISTINCT study
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (study)<-[:belongs_to]-(p_ps:participant)<-[:of_participant]-(ps:participant_status)
          WITH study,
            COLLECT({node: ps, participant_id: p_ps.participant_id}) AS ps_data,
            COLLECT(DISTINCT CASE WHEN ps IS NOT NULL AND p_ps.participant_id IS NOT NULL THEN p_ps.participant_id ELSE NULL END) AS ps_participant_list

          UNWIND ps_data AS ps_item
          WITH study, ps_participant_list, ps_item
          WHERE ps_item.node IS NOT NULL AND ps_item.participant_id IS NOT NULL

          WITH study, ps_participant_list,
            ps_item.node AS p,
            COLLECT(ps_item.participant_id) AS ps_pids

          WITH study, ps_participant_list, p,
            REDUCE(result = '', item IN ps_pids |
              result + CASE WHEN result = '' THEN item ELSE '|' + item END) AS ps_participant_ids

          WITH study, ps_participant_list,
            COLLECT({
              participant_ids:              ps_participant_ids,
              off_study:                    p.off_study,
              off_study_reason:             p.off_study_reason,
              participant_status_record_id: p.participant_status_record_id,
              survival_status:              p.survival_status
            }) AS participantStatusNodeData

          UNWIND participantStatusNodeData AS ps_node_data
          WITH study, participantStatusNodeData, ps_participant_list,
            COLLECT(ps_node_data.participant_status_record_id) AS ps_record_ids

          RETURN DISTINCT
            study.study_short_name AS study_short_name,
            participantStatusNodeData,
            size(ps_record_ids) AS participantStatusNodeCount,
            size(ps_participant_list) AS participantStatusParticipantCount
        page_size: 10
  - index_name: "clinical_trial_data_tab"
    id_field: "study_short_name"
    mapping:
      keyword:
        - study_short_name
        - targetedTherapyNodeData.participant_ids
        - targetedTherapyNodeData.targeted_therapy
        - targetedTherapyNodeData.targeted_therapy_dose
        - targetedTherapyNodeData.targeted_therapy_frequency
        - targetedTherapyNodeData.targeted_therapy_record_id
        - nonTargetedTherapyNodeData.participant_ids
        - nonTargetedTherapyNodeData.non_targeted_therapy_record_id
        - nonTargetedTherapyNodeData.best_response_to_non_targeted_therapy
        - nonTargetedTherapyNodeData.non_targeted_therapy
        - nonTargetedTherapyNodeData.non_targeted_therapy_dose
        - nonTargetedTherapyNodeData.non_targeted_therapy_frequency
        - radiotherapyNodeData.participant_ids
        - radiotherapyNodeData.radiation_dose
        - radiotherapyNodeData.radiation_extent
        - radiotherapyNodeData.radiation_frequency
        - radiotherapyNodeData.radiological_procedure
        - radiotherapyNodeData.radiological_procedure_anatomical_location
        - radiotherapyNodeData.radiological_procedure_record_id
        - radiotherapyNodeData.uuid
        - surgeryNodeData.participant_ids
        - surgeryNodeData.extent_of_residual_disease
        - surgeryNodeData.surgical_procedure
        - surgeryNodeData.surgical_procedure_anatomical_location
        - surgeryNodeData.surgical_procedure_date
        - surgeryNodeData.surgical_procedure_findings
        - surgeryNodeData.surgical_procedure_record_id
        - surgeryNodeData.surgical_procedure_therapeutic
      long:
        - targetedTherapyNodeCount
        - targetedTherapyParticipantCount
        - nonTargetedTherapyNodeCount
        - nonTargetedTherapyParticipantCount
        - radiotherapyNodeCount
        - radiotherapyParticipantCount
        - surgeryNodeCount
        - surgeryParticipantCount
    initial_query:
      query: |
        MATCH (study:study)
        WITH DISTINCT study
        ORDER BY study.study_short_name
        RETURN DISTINCT
          study.study_short_name AS study_short_name
        SKIP $skip LIMIT $limit
      page_size: 50
    update_queries:
      # Targeted Therapy
      - name: "Targeted Therapy"
        query: |
          MATCH (study:study)
          WITH DISTINCT study
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (study)<-[:belongs_to]-(p_tt:participant)<-[:of_participant]-(tt:targeted_therapy)
          WITH study, COLLECT({node: tt, participant_id: p_tt.participant_id}) AS tt_data
          
          UNWIND tt_data AS tt_count_item
          WITH study, tt_data,
            COLLECT(DISTINCT CASE WHEN tt_count_item.node IS NOT NULL AND tt_count_item.participant_id IS NOT NULL THEN tt_count_item.participant_id ELSE NULL END) AS tt_participant_list
          
          UNWIND tt_data AS tt_item
          WITH study, tt_participant_list,
            COLLECT(DISTINCT tt_item.node) AS unique_tt, tt_data
          
          UNWIND unique_tt AS t
          UNWIND tt_data AS tt_item
          WITH study, t, tt_item, tt_participant_list
          WHERE tt_item.node = t AND tt_item.participant_id IS NOT NULL
          WITH study, t, COLLECT(tt_item.participant_id) AS tt_pids, tt_participant_list
          WITH study, t, tt_participant_list,
            REDUCE(result = '', item IN tt_pids |
              result + CASE WHEN result = '' THEN item ELSE '|' + item END) AS tt_participant_ids
          
          WITH study, COLLECT({
            participant_ids: tt_participant_ids,
            targeted_therapy: t.targeted_therapy,
            targeted_therapy_dose: t.targeted_therapy_dose,
            targeted_therapy_frequency: toString(t.targeted_therapy_frequency),
            targeted_therapy_record_id: t.targeted_therapy_record_id
          }) AS targetedTherapyNodeData, tt_participant_list
          
          UNWIND targetedTherapyNodeData AS tt_node_data
          WITH study, targetedTherapyNodeData, tt_participant_list,
            COLLECT(tt_node_data.targeted_therapy_record_id) AS tt_record_ids
          
          RETURN DISTINCT
            study.study_short_name AS study_short_name,
            targetedTherapyNodeData,
            size(tt_record_ids) AS targetedTherapyNodeCount,
            size(tt_participant_list) AS targetedTherapyParticipantCount
        page_size: 50
      # Non-Targeted Therapy
      - name: "Non-Targeted Therapy"
        query: |
          MATCH (study:study)
          WITH DISTINCT study
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (study)<-[:belongs_to]-(p_nt:participant)<-[:of_participant]-(nt:non_targeted_therapy)
          WITH study, COLLECT({node: nt, participant_id: p_nt.participant_id}) AS nt_data
          
          UNWIND nt_data AS nt_count_item
          WITH study, nt_data,
            COLLECT(DISTINCT CASE WHEN nt_count_item.node IS NOT NULL AND nt_count_item.participant_id IS NOT NULL THEN nt_count_item.participant_id ELSE NULL END) AS nt_participant_list
          
          UNWIND nt_data AS nt_item
          WITH study, nt_participant_list,
            COLLECT(DISTINCT nt_item.node) AS unique_nt, nt_data
          
          UNWIND unique_nt AS n
          UNWIND nt_data AS nt_item
          WITH study, n, nt_item, nt_participant_list
          WHERE nt_item.node = n AND nt_item.participant_id IS NOT NULL
          WITH study, n, COLLECT(nt_item.participant_id) AS nt_pids, nt_participant_list
          WITH study, n, nt_participant_list,
            REDUCE(result = '', item IN nt_pids |
              result + CASE WHEN result = '' THEN item ELSE '|' + item END) AS nt_participant_ids
          
          WITH study, COLLECT({
            participant_ids: nt_participant_ids,
            non_targeted_therapy_record_id: n.non_targeted_therapy_record_id,
            best_response_to_non_targeted_therapy: toString(COALESCE(n.best_response_to_non_targeted_therapy, '')),
            non_targeted_therapy: toString(COALESCE(n.non_targeted_therapy, '')),
            non_targeted_therapy_dose: toString(COALESCE(n.non_targeted_therapy_dose, '')),
            non_targeted_therapy_frequency: toString(COALESCE(n.non_targeted_therapy_frequency, ''))
          }) AS nonTargetedTherapyNodeData, nt_participant_list
          
          UNWIND nonTargetedTherapyNodeData AS nt_node_data
          WITH study, nonTargetedTherapyNodeData, nt_participant_list,
            COLLECT(nt_node_data.non_targeted_therapy_record_id) AS nt_record_ids
          
          RETURN DISTINCT
            study.study_short_name AS study_short_name,
            nonTargetedTherapyNodeData,
            size(nt_record_ids) AS nonTargetedTherapyNodeCount,
            size(nt_participant_list) AS nonTargetedTherapyParticipantCount
        page_size: 50
      # Radiotherapy
      - name: "Radiotherapy"
        query: |
          MATCH (study:study)
          WITH DISTINCT study
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (study)<-[:belongs_to]-(p_rt:participant)<-[:of_participant]-(rt:radiotherapy)
          WITH study, COLLECT({node: rt, participant_id: p_rt.participant_id}) AS rt_data
          
          UNWIND rt_data AS rt_count_item
          WITH study, rt_data,
            COLLECT(DISTINCT CASE WHEN rt_count_item.node IS NOT NULL AND rt_count_item.participant_id IS NOT NULL THEN rt_count_item.participant_id ELSE NULL END) AS rt_participant_list
          
          UNWIND rt_data AS rt_item
          WITH study, rt_participant_list,
            COLLECT(DISTINCT rt_item.node) AS unique_rt, rt_data
          
          UNWIND unique_rt AS r
          UNWIND rt_data AS rt_item
          WITH study, r, rt_item, rt_participant_list
          WHERE rt_item.node = r AND rt_item.participant_id IS NOT NULL
          WITH study, r, COLLECT(rt_item.participant_id) AS rt_pids, rt_participant_list
          WITH study, r, rt_participant_list,
            REDUCE(result = '', item IN rt_pids |
              result + CASE WHEN result = '' THEN item ELSE '|' + item END) AS rt_participant_ids
          
          WITH study, COLLECT({
            participant_ids: rt_participant_ids,
            radiation_dose: r.radiation_dose,
            radiation_extent: r.radiation_extent,
            radiation_frequency: r.radiation_frequency,
            radiological_procedure: r.radiological_procedure,
            radiological_procedure_anatomical_location: r.radiological_procedure_anatomical_location,
            radiological_procedure_record_id: r.radiological_procedure_record_id,
            uuid: r.uuid
          }) AS radiotherapyNodeData, rt_participant_list
          
          UNWIND radiotherapyNodeData AS r_node_data
          WITH study, radiotherapyNodeData, rt_participant_list,
            COLLECT(r_node_data.radiological_procedure_record_id) AS r_record_ids
          
          RETURN DISTINCT
            study.study_short_name AS study_short_name,
            radiotherapyNodeData,
            size(r_record_ids) AS radiotherapyNodeCount,
            size(rt_participant_list) AS radiotherapyParticipantCount
        page_size: 50
      # Surgery
      - name: "Surgery"
        query: |
          MATCH (study:study)
          WITH DISTINCT study
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (study)<-[:belongs_to]-(p_surg:participant)<-[:of_participant]-(surg:surgery)
          WITH study, COLLECT({node: surg, participant_id: p_surg.participant_id}) AS surg_data
          
          UNWIND surg_data AS surg_count_item
          WITH study, surg_data,
            COLLECT(DISTINCT CASE WHEN surg_count_item.node IS NOT NULL AND surg_count_item.participant_id IS NOT NULL THEN surg_count_item.participant_id ELSE NULL END) AS surg_participant_list
          
          UNWIND surg_data AS surg_item
          WITH study, surg_participant_list,
            COLLECT(DISTINCT surg_item.node) AS unique_surg, surg_data
          
          UNWIND unique_surg AS sg
          UNWIND surg_data AS surg_item
          WITH study, sg, surg_item, surg_participant_list
          WHERE surg_item.node = sg AND surg_item.participant_id IS NOT NULL
          WITH study, sg, COLLECT(surg_item.participant_id) AS surg_pids, surg_participant_list
          WITH study, sg, surg_participant_list,
            REDUCE(result = '', item IN surg_pids |
              result + CASE WHEN result = '' THEN item ELSE '|' + item END) AS surg_participant_ids
          
          WITH study, COLLECT({
            participant_ids: surg_participant_ids,
            extent_of_residual_disease: sg.extent_of_residual_disease,
            surgical_procedure: sg.surgical_procedure,
            surgical_procedure_anatomical_location: sg.surgical_procedure_anatomical_location,
            surgical_procedure_date: toString(sg.surgical_procedure_date),
            surgical_procedure_findings: sg.surgical_procedure_findings,
            surgical_procedure_record_id: sg.surgical_procedure_record_id,
            surgical_procedure_therapeutic: sg.surgical_procedure_therapeutic
          }) AS surgeryNodeData, surg_participant_list
          
          UNWIND surgeryNodeData AS s_node_data
          WITH study, surgeryNodeData, surg_participant_list,
            COLLECT(s_node_data.surgical_procedure_record_id) AS s_record_ids
          
          RETURN DISTINCT
            study.study_short_name AS study_short_name,
            surgeryNodeData,
            size(s_record_ids) AS surgeryNodeCount,
            size(surg_participant_list) AS surgeryParticipantCount
        page_size: 50
  - index_name: "study_node_counts"
    id_field: "short_name"
    mapping:
      keyword:
        - short_name
        - node_label
      long:
        - participant_count
        - total_node_count
    initial_query:
      query: |
        MATCH (study:study)<-[:belongs_to]-(p:participant)
        OPTIONAL MATCH (p)<-[:of_participant]-(diag:diagnosis)
        OPTIONAL MATCH (p)<-[:of_participant]-(spec:specimen)
        OPTIONAL MATCH (p)<-[:of_participant]-(demo:demographic)
        OPTIONAL MATCH (p)<-[:of_participant]-(exp:exposure)
        OPTIONAL MATCH (p)<-[:of_participant]-(surg:surgery)
        OPTIONAL MATCH (p)<-[:of_participant]-(tt:targeted_therapy)
        OPTIONAL MATCH (p)<-[:of_participant]-(nt:non_targeted_therapy)
        OPTIONAL MATCH (p)<-[:of_participant]-(rt:radiotherapy)
        WITH study,p,
          collect(DISTINCT diag) AS diags,
          collect(DISTINCT spec) AS specs,
          collect(DISTINCT demo) AS demos,
          collect(DISTINCT exp) AS exps,
          collect(DISTINCT surg) AS surgs,
          collect(DISTINCT tt) AS tts,
          collect(DISTINCT nt) AS nts,
          collect(DISTINCT rt) as rts
        WITH study,p,
          [
            {label: 'diagnosis', nodeCount: size(diags), participant: CASE WHEN size(diags) > 0 THEN p END},
            {label: 'specimen', nodeCount: size(specs), participant: CASE WHEN size(specs) > 0 THEN p END},
            {label: 'demographic', nodeCount: size(demos), participant: CASE WHEN size(demos) > 0 THEN p END},
            {label: 'exposure', nodeCount: size(exps), participant: CASE WHEN size(exps) > 0 THEN p END},
            {label: 'surgery', nodeCount: size(surgs), participant: CASE WHEN size(surgs) > 0 THEN p END},
            {label: 'radiotherapy', nodeCount: size(rts), participant: CASE WHEN size(rts) > 0 THEN p END},
            {label: 'targeted_therapy', nodeCount: size(tts), participant: CASE WHEN size(tts) > 0 THEN p END},
            {label: 'non_targeted_therapy', nodeCount: size(nts), participant: CASE WHEN size(nts) > 0 THEN p END}
          ] AS rows
        UNWIND rows AS row
        WITH row.label AS node_label,
            row.nodeCount AS node_count,
            row.participant AS participant,
            study
        RETURN
          study.study_short_name as short_name,
          node_label,
          count(DISTINCT participant) AS participant_count,
          sum(node_count) AS total_node_count
        ORDER BY participant_count DESC
        SKIP $skip LIMIT $limit
      page_size: 50
  - index_name: "about_page"
    type: "about_file"
