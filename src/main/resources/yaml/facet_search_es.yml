queries:
  - name: searchParticipants
    globalRangeFields:
    returnFields:
      - name: diagnosesAndStageOfDiseases
        index:
          - widgets_facets_counts
        filter:
          type: sub_aggregation
          selectedField: ctep_disease_term
          subAggSelectedField: stage_of_disease
        result:
          type: arm_program
      - name: racesAndEthnicities
        index:
          - widgets_facets_counts
        filter:
          type: sub_aggregation
          selectedField: race
          subAggSelectedField: ethnicity
        result:
          type: arm_program
      - name: timepointsAndBiospecimensTypes
        index:
          - tab_biospecimens
        filter:
          type: sub_aggregation
          selectedField: assessment_timepoint
          subAggSelectedField: specimen_type
          nestedPath: biospecimen_info
          nestedParameters:
            - specimen_type,
            - anatomical_collection_site,
            - tissue_category,
            - assessment_timepoint
        result:
          type: arm_program
      - name: numberOfStudies
        index:
          - widgets_facets_counts
        filter:
          type: aggregation
          selectedField: study_short_name
        result:
          type: int
          method: count_bucket_keys
      - name: numberOfParticipants
        index:
          - widgets_facets_counts
        filter:
          type: aggregation
          selectedField: participant_id
        result:
          type: int
          method: count_bucket_keys
      - name: numberOfDiagnoses
        index:
          - widgets_facets_counts
        filter:
          type: aggregation
          selectedField: ctep_disease_term
        result:
          type: int
          method: count_bucket_keys
      - name: numberOfTargetedTherapies
        index:
          - therapy_count
        filter:
          type: aggregation
          selectedField: targeted_therapy
        result:
          type: int
          method: count_bucket_keys
      - name: numberOfSpecimens
        index:
          - tab_biospecimens
        filter:
          type: aggregation
          selectedField: specimen_record_id
        result:
          type: int
          method: count_bucket_keys
      - name: numberOfFiles
        index:
          - tab_data_files
        filter:
          type: aggregation
          selectedField: data_file_uuid
        result:
          type: int
          method: count_bucket_keys
      - name: participantCountByCtepDiseaseTerm
        index:
          - widgets_facets_counts
        filter:
          type: aggregation
          selectedField: ctep_disease_term
