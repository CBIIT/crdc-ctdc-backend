        - data_files.data_file_compression_status
        - data_files.data_file_location
        - biospecimen_info.specimen_record_id_biospecimen_info
        - biospecimen_info.anatomical_collection_site_biospecimen_info
        - biospecimen_info.specimen_type_biospecimen_info
        - biospecimen_info.tissue_category_biospecimen_info
        - biospecimen_info.assessment_timepoint_biospecimen_info
        - data_file_uuid
        - tumor_grade
        - sex
        - race
        - ethnicity
        - carcinogen_exposure
        - targeted_therapy
        - targeted_therapy_string
        - data_file_type
        - data_file_format
      long:
        - data_file_size
        - data_files.data_file_size
      # ...existing code...
    initial_query:
      query: |
          MATCH (spec:specimen)-[:of_participant]->(sub:participant)
          OPTIONAL MATCH (study:study)<-[:belongs_to]-(sub)
          OPTIONAL MATCH (sub)<-[:of_participant]-(demo:demographic)
          OPTIONAL MATCH (sub)<-[:of_participant]-(exp:exposure)
          OPTIONAL MATCH (sub)<-[*..2]-(df:file)
          WITH sub, spec, study, demo, exp, df,
              toUpper(toLower(COALESCE(spec.anatomical_collection_site, ''))) AS acs_norm

          CALL {
            WITH sub
            OPTIONAL MATCH (sub)<-[:of_participant]-(tt:targeted_therapy)
            WHERE tt.targeted_therapy IS NOT NULL AND tt.targeted_therapy <> ''
            RETURN COLLECT(DISTINCT tt.targeted_therapy) AS targeted_therapy
          }

          CALL {
            WITH sub
            OPTIONAL MATCH (sub)<-[:of_participant]-(d:diagnosis)
            WITH d
            ORDER BY id(d) DESC
            WITH head(collect(d)) AS best
            RETURN
              best.primary_disease_site              AS primary_disease_site,
              best.ctep_disease_term                 AS ctep_disease_term,
              best.stage_of_disease                  AS stage_of_disease,
              best.primary_diagnosis_disease_group   AS primary_diagnosis_disease_group,
              best.tumor_grade                       AS tumor_grade
          }

          CALL {
            WITH sub
            OPTIONAL MATCH (t:targeted_therapy)-[:of_participant]->(sub)
            WHERE t.targeted_therapy IS NOT NULL AND t.targeted_therapy <> ''
            WITH COLLECT(DISTINCT toLower(t.targeted_therapy)) AS dedup
            RETURN REDUCE(result = '', item IN dedup | result + CASE WHEN result = '' THEN item ELSE '|' + item END) AS targeted_therapy_string
          }

          RETURN DISTINCT
          'biospecimens' AS type,
          sub.participant_id AS participant_id,
          ctep_disease_term,
          stage_of_disease,
          primary_disease_site,
          primary_diagnosis_disease_group,
          study.study_short_name AS study_short_name,
          COLLECT(DISTINCT {
            data_file_uuid: df.data_file_uuid,
            data_file_name: df.data_file_name,
            data_file_type: df.data_file_type,
            data_file_description: df.data_file_description,
            data_file_format: df.data_file_format,
            data_file_size: df.data_file_size,
            data_file_checksum_value: df.data_file_checksum_value,
            data_file_checksum_type: df.data_file_checksum_type,
            data_file_compression_status: df.data_file_compression_status,
            data_file_location: df.data_file_location
          }) AS data_files,
          COLLECT(DISTINCT {
            specimen_record_id_biospecimen_info: spec.specimen_record_id,
            anatomical_collection_site_biospecimen_info: acs_norm,
            specimen_type_biospecimen_info: spec.specimen_type,
            tissue_category_biospecimen_info: spec.tissue_category,
            assessment_timepoint_biospecimen_info: spec.assessment_timepoint
          }) AS biospecimen_info,
          tumor_grade,
          demo.sex AS sex,
          demo.race AS race,
          demo.ethnicity AS ethnicity,
          COLLECT(DISTINCT exp.carcinogen_exposure) AS carcinogen_exposure,
          targeted_therapy,
          targeted_therapy_string

          SKIP $skip LIMIT $limit
      page_size: 10000
  - index_name: "tab_data_files"
    id_field: "data_file_uuid"
    mapping:
      keyword:
        - type
        - study_short_name
        - study_accession_id
        - anatomical_collection_site
        - specimen_type
        - tissue_category
        - assessment_timepoint
        - data_file_name
        - data_file_format
        - data_file_type
        - data_file_uuid
        - drs_uri
        - data_file_description
        - data_file_checksum_value
        - data_file_checksum_type
        - data_file_location
        - data_file_compression_status
        - association
        - participant_id
        - specimen_record_id
        - ctep_disease_term
        - primary_diagnosis_disease_group
        - stage_of_disease
        - tumor_grade
        - primary_disease_site
        - meddra_disease_code
        - histology
        - sex
        - race
        - ethnicity
        - carcinogen_exposure
        - targeted_therapy
        # - targeted_therapy_string
        - biospecimen_info.specimen_record_id_biospecimen_info
        - biospecimen_info.anatomical_collection_site_biospecimen_info
        - biospecimen_info.specimen_type_biospecimen_info
        - biospecimen_info.tissue_category_biospecimen_info
        - biospecimen_info.assessment_timepoint_biospecimen_info
        - file_info.data_file_uuid_file_info
        - file_info.data_file_format_file_info
        - file_info.data_file_type_file_info
      long:
        - data_file_size
        - age_at_enrollment
    initial_query:
      query: |
        CALL {
          MATCH (sub:participant)<-[*..2]-(parent)<--(f:file)
          RETURN f.data_file_uuid AS uuid, 'biospecimen' AS association
          UNION
          MATCH (sub:participant)<-[:associated_with]-(f:file)
          RETURN f.data_file_uuid AS uuid, 'participant' AS association
        }
        WITH uuid, COLLECT(DISTINCT association) AS associations
        MATCH (f:file {data_file_uuid: uuid})
        OPTIONAL MATCH (f)-[:associated_with]->(spec1:specimen)-[:of_participant]->(sub1:participant)
        OPTIONAL MATCH (f)-[:associated_with]->(sub2:participant)
        WITH
          f, associations,
          COLLECT(sub1) + COLLECT(sub2) AS subs,
          COLLECT(spec1)                AS specs
        OPTIONAL MATCH (sPart:participant)-[:belongs_to]->(study:study)
        WHERE sPart IN subs
        WITH
          f, associations, subs, specs,
          COLLECT(DISTINCT study.study_short_name) AS study_short_names,
          COLLECT(DISTINCT study.study_accession)  AS study_accession_ids
        OPTIONAL MATCH (dPart:participant)<-[:of_participant]-(diag:diagnosis)
        WHERE dPart IN subs
        WITH
          f, associations, subs, specs, study_short_names, study_accession_ids,
          COLLECT(DISTINCT diag.ctep_disease_term)               AS ctep_terms,
          COLLECT(DISTINCT diag.primary_diagnosis_disease_group) AS pdg_list,
          COLLECT(DISTINCT diag.stage_of_disease)                AS stage_list,
          COLLECT(DISTINCT diag.tumor_grade)                     AS tumor_grades,
          COLLECT(DISTINCT diag.primary_disease_site)            AS primary_sites,
          COLLECT(DISTINCT diag.meddra_disease_code)             AS meddra_codes,
          COLLECT(DISTINCT diag.histology)                       AS histologies
        OPTIONAL MATCH (dmPart:participant)<-[:of_participant]-(demo:demographic)
        WHERE dmPart IN subs
        WITH
          f, associations, subs, specs, study_short_names, study_accession_ids,
          ctep_terms, pdg_list, stage_list, tumor_grades, primary_sites, meddra_codes, histologies,
          COLLECT(DISTINCT demo.sex)               AS sex_list,
          COLLECT(DISTINCT demo.race)              AS race_list,
          COLLECT(DISTINCT demo.ethnicity)         AS ethnicity_list,
          COLLECT(DISTINCT demo.age_at_enrollment) AS ages
        OPTIONAL MATCH (exPart:participant)<-[:of_participant]-(exp:exposure)
        WHERE exPart IN subs
        WITH
          f, associations, subs, specs, study_short_names, study_accession_ids,
          ctep_terms, pdg_list, stage_list, tumor_grades, primary_sites, meddra_codes, histologies,
          sex_list, race_list, ethnicity_list, ages,
          COLLECT(exp.carcinogen_exposure) AS carcinogen_exposure
        OPTIONAL MATCH (ttPart:participant)<-[:of_participant]-(tt:targeted_therapy)
        WHERE ttPart IN subs
        WITH
          f, associations, subs, specs, study_short_names, study_accession_ids,
          ctep_terms, pdg_list, stage_list, tumor_grades, primary_sites, meddra_codes, histologies,
          sex_list, race_list, ethnicity_list, ages, carcinogen_exposure,
          COLLECT(DISTINCT tt.targeted_therapy) AS targeted_therapy_raw
        UNWIND CASE WHEN size(specs) = 0 THEN [null] ELSE specs END AS spec
        WITH
          f, associations, subs, specs, study_short_names, study_accession_ids,
          ctep_terms, pdg_list, stage_list, tumor_grades, primary_sites, meddra_codes, histologies,
          sex_list, race_list, ethnicity_list, ages, carcinogen_exposure, targeted_therapy_raw,
          subs[0]  AS first_sub,
          specs[0] AS first_spec,
          COLLECT({
            specimen_record_id_biospecimen_info:         spec.specimen_record_id_biospecimen_info,
            anatomical_collection_site_biospecimen_info: spec.anatomical_collection_site_biospecimen_info,
            specimen_type_biospecimen_info:              spec.specimen_type_biospecimen_info,
            tissue_category_biospecimen_info:            spec.tissue_category_biospecimen_info,
            assessment_timepoint_biospecimen_info:       spec.assessment_timepoint_biospecimen_info
          }) AS biospecimen_info
        RETURN
          'data file'                                        AS type,
          study_short_names[0]                               AS study_short_name,
          study_accession_ids[0]                             AS study_accession_id,
          first_spec.anatomical_collection_site              AS anatomical_collection_site,
          first_spec.specimen_type                           AS specimen_type,
          first_spec.tissue_category                        AS tissue_category,
          first_spec.assessment_timepoint                   AS assessment_timepoint,
          first_spec.specimen_record_id                     AS specimen_record_id,
          f.data_file_name                                   AS data_file_name,
          f.data_file_format                                 AS data_file_format,
          f.data_file_type                                   AS data_file_type,
          f.data_file_size                                   AS data_file_size,
          f.data_file_uuid                                   AS data_file_uuid,
          'drs://nci-crdc.datacommons.io/' + f.data_file_uuid AS drs_uri,
          f.data_file_description                            AS data_file_description,
          f.data_file_checksum_value                         AS data_file_checksum_value,
          f.data_file_checksum_type                          AS data_file_checksum_type,
          f.data_file_location                               AS data_file_location,
          f.data_file_compression_status                     AS data_file_compression_status,
          associations                                       AS association,
          first_sub.participant_id                           AS participant_id,
          ctep_terms[0]                                      AS ctep_disease_term,
          pdg_list[0]                                        AS primary_diagnosis_disease_group,
          stage_list[0]                                      AS stage_of_disease,
          tumor_grades[0]                                    AS tumor_grade,
          primary_sites[0]                                   AS primary_disease_site,
          meddra_codes[0]                                    AS meddra_disease_code,
          histologies[0]                                     AS histology,
          sex_list[0]                                        AS sex,
          race_list[0]                                       AS race,
          ethnicity_list[0]                                  AS ethnicity,
          ages[0]                                            AS age_at_enrollment,
          carcinogen_exposure,
          targeted_therapy_raw                               AS targeted_therapy,
          biospecimen_info,
          [{ data_file_uuid_file_info:   f.data_file_uuid,
            data_file_format_file_info: f.data_file_format,
            data_file_type_file_info:   f.data_file_type }] AS file_info
            SKIP $skip LIMIT $limit
      page_size: 1000
  - index_name: clinical_data_tab
    id_field: "study_short_name"
    mapping:
      keyword:
        - study_short_name
        - unique_node_types
        - diagnosisNodeData.participant_ids
        - diagnosisNodeData.ctep_disease_term
        - diagnosisNodeData.date_of_diagnosis
        - diagnosisNodeData.date_of_diagnosis_original
        - diagnosisNodeData.date_of_diagnosis_unit
        - diagnosisNodeData.diagnosis_record_id
        - diagnosisNodeData.histological_subtype
        - diagnosisNodeData.histology
        - diagnosisNodeData.meddra_disease_code
        - diagnosisNodeData.primary_diagnosis_disease_group
        - diagnosisNodeData.primary_disease_site
        - diagnosisNodeData.snomed_disease_code
        - diagnosisNodeData.snomed_disease_term
        - diagnosisNodeData.UUID
        - demographicNodeData.participant_ids
        - demographicNodeData.age_at_enrollment
        - demographicNodeData.age_at_enrollment_original
        - demographicNodeData.age_at_enrollment_original_unit
        - demographicNodeData.age_at_enrollment_unit
        - demographicNodeData.body_surface_area
        - demographicNodeData.body_surface_area_original
        - demographicNodeData.body_surface_area_original_unit
        - demographicNodeData.body_surface_area_unit
        - demographicNodeData.demographic_record_id
        - demographicNodeData.ethnicity
        - demographicNodeData.height
        - demographicNodeData.height_original
        - demographicNodeData.height_original_unit
        - demographicNodeData.height_unit
        - demographicNodeData.ncbi_taxonomy_id
        - demographicNodeData.ncbi_taxonomy_name
        - demographicNodeData.race
        - demographicNodeData.sex
        - demographicNodeData.uuid
        - demographicNodeData.weight
        - demographicNodeData.weight_original
        - demographicNodeData.weight_original_unit
        - demographicNodeData.weight_unit
        - demographicNodeData.occupation
        - demographicNodeData.income
        - demographicNodeData.highest_level_of_education
        - exposureNodeData.participant_ids
        - exposureNodeData.carcinogen_exposure
        - exposureNodeData.exposure_record_id
        - specimenNodeData.participant_ids
        - specimenNodeData.anatomical_collection_site
        - specimenNodeData.assessment_timepoint
        - specimenNodeData.collection_date
        - specimenNodeData.collection_date_original
        - specimenNodeData.collection_date_original_unit
        - specimenNodeData.collection_date_unit
        - specimenNodeData.crdc_id
        - specimenNodeData.created
        - specimenNodeData.specimen_category
        - specimenNodeData.specimen_record_id
        - specimenNodeData.specimen_type_concept_code
        - specimenNodeData.tissue_category
      long:
        - diagnosisNodeCount
        - diagnosisParticipantCount
        - demographicNodeCount
        - demographicParticipantCount
        - exposureNodeCount
        - exposureParticipantCount
        - specimenNodeCount
        - specimenParticipantCount
    initial_query:
      query: |
        MATCH (study:study)<-[:belongs_to]-(p:participant)
        WITH study, COLLECT(DISTINCT p.participant_id) AS all_participant_ids
        OPTIONAL MATCH (study)<-[:belongs_to]-(p_diag:participant)
        OPTIONAL MATCH (p_diag)<-[:of_participant]-(diag:diagnosis)
        WITH study, all_participant_ids,
          COLLECT(DISTINCT diag) AS unique_diag
        OPTIONAL MATCH (study)<-[:belongs_to]-(p_demo:participant)
        OPTIONAL MATCH (p_demo)<-[:of_participant]-(demo:demographic)
        WITH study, all_participant_ids, unique_diag,
          COLLECT(DISTINCT demo) AS unique_demo
        OPTIONAL MATCH (study)<-[:belongs_to]-(p_exp:participant)
        OPTIONAL MATCH (p_exp)<-[:of_participant]-(exp:exposure)
        WITH study, all_participant_ids, unique_diag, unique_demo,
          COLLECT(DISTINCT exp) AS unique_exp
        OPTIONAL MATCH (study)<-[:belongs_to]-(p_spec:participant)
        OPTIONAL MATCH (p_spec)<-[:of_participant]-(spec:specimen)
        WITH study, all_participant_ids, unique_diag, unique_demo, unique_exp,
          COLLECT(DISTINCT spec) AS unique_spec
        UNWIND CASE WHEN size(unique_diag) = 0 THEN [null] ELSE unique_diag END AS d
        OPTIONAL MATCH (dp:participant)-[:of_participant]->(d2:diagnosis)
        WHERE d2 = d
        WITH study, all_participant_ids, unique_diag, unique_demo, unique_exp, unique_spec,
          COLLECT({
            ctep_disease_term:               d.ctep_disease_term,
            date_of_diagnosis:               d.date_of_diagnosis,
            date_of_diagnosis_original:      d.date_of_diagnosis_original,
            date_of_diagnosis_unit:          d.date_of_diagnosis_unit,
            diagnosis_record_id:             d.diagnosis_record_id,
            histological_subtype:            d.histological_subtype,
            histology:                       d.histology,
            meddra_disease_code:             d.meddra_disease_code,
            primary_diagnosis_disease_group: d.primary_diagnosis_disease_group,
            primary_disease_site:            d.primary_disease_site,
            snomed_disease_code:             d.snomed_disease_code,
            snomed_disease_term:             d.snomed_disease_term,
            UUID:                            d.uuid
          }) AS diagnosisNodeData
        UNWIND CASE WHEN size(unique_demo) = 0 THEN [null] ELSE unique_demo END AS dm
        WITH study, all_participant_ids, unique_diag, unique_demo, unique_exp, unique_spec, diagnosisNodeData,
          COLLECT({
            age_at_enrollment:               dm.age_at_enrollment,
            age_at_enrollment_original:      dm.age_at_enrollment_original,
            age_at_enrollment_original_unit: dm.age_at_enrollment_original_unit,
            age_at_enrollment_unit:          dm.age_at_enrollment_unit,
            body_surface_area:               dm.body_surface_area,
            body_surface_area_original:      dm.body_surface_area_original,
            body_surface_area_original_unit: dm.body_surface_area_original_unit,
            body_surface_area_unit:          dm.body_surface_area_unit,
            demographic_record_id:           dm.demographic_record_id,
            ethnicity:                       dm.ethnicity,
            height:                          dm.height,
            height_original:                 dm.height_original,
            height_original_unit:            dm.height_original_unit,
            height_unit:                     dm.height_unit,
            ncbi_taxonomy_id:                dm.ncbi_taxonomy_id,
            ncbi_taxonomy_name:              dm.ncbi_taxonomy_name,
            race:                            dm.race,
            sex:                             dm.sex,
            uuid:                            dm.uuid,
            weight:                          dm.weight,
            weight_original:                 dm.weight_original,
            weight_original_unit:            dm.weight_original_unit,
            weight_unit:                     dm.weight_unit,
            occupation:                      dm.occupation,
            income:                          dm.income,
            highest_level_of_education:      dm.highest_level_of_education
          }) AS demographicNodeData
        UNWIND CASE WHEN size(unique_exp) = 0 THEN [null] ELSE unique_exp END AS e
        WITH study, all_participant_ids, unique_diag, unique_demo, unique_exp, unique_spec,
          diagnosisNodeData, demographicNodeData,
          COLLECT({
            carcinogen_exposure:  e.carcinogen_exposure,
            exposure_record_id:   e.exposure_record_id
          }) AS exposureNodeData
        UNWIND CASE WHEN size(unique_spec) = 0 THEN [null] ELSE unique_spec END AS s
        WITH study, all_participant_ids, unique_diag, unique_demo, unique_exp, unique_spec,
          diagnosisNodeData, demographicNodeData, exposureNodeData,
          COLLECT({
            anatomical_collection_site:    s.anatomical_collection_site,
            assessment_timepoint:          toString(s.assessment_timepoint),
            collection_date:               toString(s.collection_date),
            collection_date_original:      toString(s.collection_date_original),
            collection_date_original_unit: s.collection_date_original_unit,
            collection_date_unit:          toString(s.collection_date_unit),
            crdc_id:                       s.crdc_id,
            created:                       toString(s.created),
            specimen_category:             s.specimen_category,
            specimen_record_id:            s.specimen_record_id,
            specimen_type_concept_code:    s.specimen_type_concept_code,
            tissue_category:               s.tissue_category
          }) AS specimenNodeData
        RETURN
          study.study_short_name                AS study_short_name,
          ['diagnosis','demographic','exposure','specimen'] AS unique_node_types,
          diagnosisNodeData,
          size(diagnosisNodeData)               AS diagnosisNodeCount,
          size(all_participant_ids)             AS diagnosisParticipantCount,
          demographicNodeData,
          size(demographicNodeData)             AS demographicNodeCount,
          size(all_participant_ids)             AS demographicParticipantCount,
          exposureNodeData,
          size(exposureNodeData)                AS exposureNodeCount,
          size(all_participant_ids)             AS exposureParticipantCount,
          specimenNodeData,
          size(specimenNodeData)                AS specimenNodeCount,
          size(all_participant_ids)             AS specimenParticipantCount
        SKIP $skip LIMIT $limit
      page_size: 1000
