      WITH study, all_participant_ids, diag_data, demo_data, rt_data,
        COLLECT({node: exp, participant_id: p_exp.participant_id}) as exp_data
      OPTIONAL MATCH (study)<-[:belongs_to]-(p_spec:participant)
      OPTIONAL MATCH (p_spec)<-[:of_participant]-(spec:specimen)
      WITH study, all_participant_ids, diag_data, demo_data, rt_data, exp_data,
        COLLECT({node: spec, participant_id: p_spec.participant_id}) as spec_data
      OPTIONAL MATCH (study)<-[:belongs_to]-(p_tt:participant)
      OPTIONAL MATCH (p_tt)<-[:of_participant]-(tt:targeted_therapy)
      WITH study, all_participant_ids, diag_data, demo_data, rt_data, exp_data, spec_data,
        COLLECT({node: tt, participant_id: p_tt.participant_id}) as tt_data
      WITH study, all_participant_ids,
        apoc.coll.toSet([x IN diag_data WHERE x.node IS NOT NULL | x.node]) as unique_diag,
        diag_data,
        apoc.coll.toSet([x IN demo_data WHERE x.node IS NOT NULL | x.node]) as unique_demo,
        demo_data,
        apoc.coll.toSet([x IN rt_data WHERE x.node IS NOT NULL | x.node]) as unique_rt,
        rt_data,
        apoc.coll.toSet([x IN exp_data WHERE x.node IS NOT NULL | x.node]) as unique_exp,
        exp_data,
        apoc.coll.toSet([x IN spec_data WHERE x.node IS NOT NULL | x.node]) as unique_spec,
        spec_data,
        apoc.coll.toSet([x IN tt_data WHERE x.node IS NOT NULL | x.node]) as unique_tt,
        tt_data
      RETURN
        study.study_short_name as study_short_name,
        [d IN unique_diag | {
          participant_ids: apoc.text.join([x IN diag_data WHERE x.node = d AND x.participant_id IS NOT NULL | x.participant_id], '|'),
          ctep_disease_term: d.ctep_disease_term,
          date_of_diagnosis: d.date_of_diagnosis,
          date_of_diagnosis_original: d.date_of_diagnosis_original,
          date_of_diagnosis_unit: d.date_of_diagnosis_unit,
          diagnosis_record_id: d.diagnosis_record_id,
          histological_subtype: d.histological_subtype,
          histology: d.histology,
          meddra_disease_code: d.meddra_disease_code,
          primary_diagnosis_disease_group: d.primary_diagnosis_disease_group,
          primary_disease_site: d.primary_disease_site,
          snomed_disease_code: d.snomed_disease_code,
          snomed_disease_term: d.snomed_disease_term,
          UUID: d.uuid
        }] as diagnosis,
        size([x IN diag_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id]) as diagnosis_participant_count,
        [dm IN unique_demo | {
          participant_ids: apoc.text.join([x IN demo_data WHERE x.node = dm AND x.participant_id IS NOT NULL | x.participant_id], '|'),
          age_at_enrollment: dm.age_at_enrollment,
          age_at_enrollment_original: dm.age_at_enrollment_original,
          age_at_enrollment_original_unit: dm.age_at_enrollment_original_unit,
          age_at_enrollment_unit: dm.age_at_enrollment_unit,
          body_surface_area: dm.body_surface_area,
          body_surface_area_original: dm.body_surface_area_original,
          body_surface_area_original_unit: dm.body_surface_area_original_unit,
          body_surface_area_unit: dm.body_surface_area_unit,
          demographic_record_id: dm.demographic_record_id,
          ethnicity: dm.ethnicity,
          height: dm.height,
          height_original: dm.height_original,
          height_original_unit: dm.height_original_unit,
          height_unit: dm.height_unit,
          ncbi_taxonomy_id: dm.ncbi_taxonomy_id,
          ncbi_taxonomy_name: dm.ncbi_taxonomy_name,
          race: dm.race,
          sex: dm.sex,
          uuid: dm.uuid,
          weight: dm.weight,
          weight_original: dm.weight_original,
          weight_original_unit: dm.weight_original_unit,
          weight_unit: dm.weight_unit,
          occupation: dm.occupation,
          income: dm.income,
          highest_level_of_education: dm.highest_level_of_education
        }] as demographic,
        size([x IN demo_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id]) as demographic_participant_count,
        [r IN unique_rt | {
          participant_ids: apoc.text.join([x IN rt_data WHERE x.node = r AND x.participant_id IS NOT NULL | x.participant_id], '|'),
          radiation_dose: r.radiation_dose,
          radiation_extent: r.radiation_extent,
          radiation_frequency: r.radiation_frequency,
          radiological_procedure: r.radiological_procedure,
          radiological_procedure_anatomical_location: r.radiological_procedure_anatomical_location,
          radiological_procedure_record_id: r.radiological_procedure_record_id,
          uuid: r.uuid
        }] as radiotherapy,
        size([x IN rt_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id]) as radiotherapy_participant_count,
        [e IN unique_exp | {
          participant_ids: apoc.text.join([x IN exp_data WHERE x.node = e AND x.participant_id IS NOT NULL | x.participant_id], '|'),
          carcinogen_exposure: e.carcinogen_exposure,
          exposure_record_id: e.exposure_record_id
        }] as exposure,
        size([x IN exp_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id]) as exposure_participant_count,
        [s IN unique_spec | {
          participant_ids: apoc.text.join([x IN spec_data WHERE x.node = s AND x.participant_id IS NOT NULL | x.participant_id], '|'),
          anatomical_collection_site: s.anatomical_collection_site,
          assessment_timepoint: toString(s.assessment_timepoint),
          collection_date: toString(s.collection_date),
          collection_date_original: toString(s.collection_date_original),
          collection_date_original_unit: s.collection_date_original_unit,
          collection_date_unit: toString(s.collection_date_unit),
          crdc_id: s.crdc_id,
          created: toString(s.created),
          specimen_category: s.specimen_category,
          specimen_record_id: s.specimen_record_id,
          specimen_type_concept_code: s.specimen_type_concept_code,
          tissue_category: s.tissue_category
        }] as specimen,
        size([x IN spec_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id]) as specimen_participant_count,
        [t IN unique_tt | {
          participant_ids: apoc.text.join([x IN tt_data WHERE x.node = t AND x.participant_id IS NOT NULL | x.participant_id], '|'),
          targeted_therapy: t.targeted_therapy,
          targeted_therapy_dose: t.targeted_therapy_dose,
          targeted_therapy_frequency: toString(t.targeted_therapy_frequency),
          targeted_therapy_record_id: t.targeted_therapy_record_id
        }] as targeted_therapy,
        size([x IN tt_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id]) as targeted_therapy_participant_count
        "
  - index_name: clinical_data_tab_2
    type: neo4j
    mapping:
      study_short_name:
        type: keyword
      non_targeted_therapy:
        type: nested
        properties:
          participant_ids:
            type: keyword
          non_targeted_therapy_record_id:
            type: keyword
          best_response_to_non_targeted_therapy:
            type: keyword
          non_targeted_therapy:
            type: keyword
          non_targeted_therapy_dose:
            type: keyword
          non_targeted_therapy_frequency:
            type: keyword
      non_targeted_therapy_participant_count:
        type: integer
      surgery:
        type: nested
        properties:
          participant_ids:
            type: keyword
          extent_of_residual_disease:
            type: keyword
          surgical_procedure:
            type: keyword
          surgical_procedure_anatomical_location:
            type: keyword
          surgical_procedure_date:
            type: keyword
          surgical_procedure_findings:
            type: keyword
          surgical_procedure_record_id:
            type: keyword
          surgical_procedure_therapeutic:
            type: keyword
      surgery_participant_count:
        type: integer
    cypher_query: "
      MATCH (study:study)<-[:belongs_to]-(p:participant)
      WITH study, COLLECT(DISTINCT p.participant_id) as all_participant_ids
      OPTIONAL MATCH (study)<-[:belongs_to]-(p_nt:participant)
      OPTIONAL MATCH (p_nt)<-[:of_participant]-(nt:non_targeted_therapy)
      WITH study, all_participant_ids,
        COLLECT({node: nt, participant_id: p_nt.participant_id}) as nt_data
      OPTIONAL MATCH (study)<-[:belongs_to]-(p_surg:participant)
      OPTIONAL MATCH (p_surg)<-[:of_participant]-(surg:surgery)
      WITH study, all_participant_ids, nt_data,
        COLLECT({node: surg, participant_id: p_surg.participant_id}) as surg_data
      WITH study, all_participant_ids,
        apoc.coll.toSet([x IN nt_data WHERE x.node IS NOT NULL | x.node]) as unique_nt,
        nt_data,
        apoc.coll.toSet([x IN surg_data WHERE x.node IS NOT NULL | x.node]) as unique_surg,
        surg_data
      RETURN
        study.study_short_name as study_short_name,
        [n IN unique_nt | {
          participant_ids: apoc.text.join([x IN nt_data WHERE x.node = n AND x.participant_id IS NOT NULL | x.participant_id], '|'),
          non_targeted_therapy_record_id: n.non_targeted_therapy_record_id,
          best_response_to_non_targeted_therapy: toString(COALESCE(n.best_response_to_non_targeted_therapy, '')),
          non_targeted_therapy: toString(COALESCE(n.non_targeted_therapy, '')),
          non_targeted_therapy_dose: toString(COALESCE(n.non_targeted_therapy_dose, '')),
          non_targeted_therapy_frequency: toString(COALESCE(n.non_targeted_therapy_frequency, ''))
        }] as non_targeted_therapy,
        size([x IN nt_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id]) as non_targeted_therapy_participant_count,
        [sg IN unique_surg | {
          participant_ids: apoc.text.join([x IN surg_data WHERE x.node = sg AND x.participant_id IS NOT NULL | x.participant_id], '|'),
          extent_of_residual_disease: sg.extent_of_residual_disease,
          surgical_procedure: sg.surgical_procedure,
          surgical_procedure_anatomical_location: sg.surgical_procedure_anatomical_location,
          surgical_procedure_date: toString(sg.surgical_procedure_date),
          surgical_procedure_findings: sg.surgical_procedure_findings,
          surgical_procedure_record_id: sg.surgical_procedure_record_id,
          surgical_procedure_therapeutic: sg.surgical_procedure_therapeutic
        }] as surgery,
        size([x IN surg_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id]) as surgery_participant_count
        "
