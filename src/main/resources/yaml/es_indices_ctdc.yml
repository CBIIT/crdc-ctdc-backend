            participant_ids: apoc.text.join([x IN tt_data WHERE x.node = t AND x.participant_id IS NOT NULL | x.participant_id], '|'),
            targeted_therapy: t.targeted_therapy,
            targeted_therapy_dose: t.targeted_therapy_dose,
            targeted_therapy_frequency: toString(t.targeted_therapy_frequency),
            targeted_therapy_record_id: t.targeted_therapy_record_id
          }] AS targetedTherapyNodeData,
          size(apoc.coll.toSet([x IN tt_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id])) AS targetedTherapyParticipantCount,
          [n IN unique_nt | {
            participant_ids: apoc.text.join([x IN nt_data WHERE x.node = n AND x.participant_id IS NOT NULL | x.participant_id], '|'),
            non_targeted_therapy_record_id: n.non_targeted_therapy_record_id,
            best_response_to_non_targeted_therapy: toString(COALESCE(n.best_response_to_non_targeted_therapy, '')),
            non_targeted_therapy: toString(COALESCE(n.non_targeted_therapy, '')),
            non_targeted_therapy_dose: toString(COALESCE(n.non_targeted_therapy_dose, '')),
            non_targeted_therapy_frequency: toString(COALESCE(n.non_targeted_therapy_frequency, ''))
          }] AS nonTargetedTherapyNodeData,
          size(apoc.coll.toSet([x IN nt_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id])) AS nonTargetedTherapyParticipantCount,
          [r IN unique_rt | {
            participant_ids: apoc.text.join([x IN rt_data WHERE x.node = r AND x.participant_id IS NOT NULL | x.participant_id], '|'),
            radiation_dose: r.radiation_dose,
            radiation_extent: r.radiation_extent,
            radiation_frequency: r.radiation_frequency,
            radiological_procedure: r.radiological_procedure,
            radiological_procedure_anatomical_location: r.radiological_procedure_anatomical_location,
            radiological_procedure_record_id: r.radiological_procedure_record_id,
            uuid: r.uuid
          }] AS radiotherapyNodeData,
          size(apoc.coll.toSet([x IN rt_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id])) AS radiotherapyParticipantCount,
          [sg IN unique_surg | {
            participant_ids: apoc.text.join([x IN surg_data WHERE x.node = sg AND x.participant_id IS NOT NULL | x.participant_id], '|'),
            extent_of_residual_disease: sg.extent_of_residual_disease,
            surgical_procedure: sg.surgical_procedure,
            surgical_procedure_anatomical_location: sg.surgical_procedure_anatomical_location,
            surgical_procedure_date: toString(sg.surgical_procedure_date),
            surgical_procedure_findings: sg.surgical_procedure_findings,
            surgical_procedure_record_id: sg.surgical_procedure_record_id,
            surgical_procedure_therapeutic: sg.surgical_procedure_therapeutic
          }] AS surgeryNodeData,
          size(apoc.coll.toSet([x IN surg_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id])) AS surgeryParticipantCount
        RETURN
          study.study_short_name AS study_short_name,
          targetedTherapyNodeData,
          size(apoc.coll.toSet([t IN targetedTherapyNodeData | t.targeted_therapy_record_id])) AS targetedTherapyNodeCount,
          targetedTherapyParticipantCount,
          nonTargetedTherapyNodeData,
          size(apoc.coll.toSet([n IN nonTargetedTherapyNodeData | n.non_targeted_therapy_record_id])) AS nonTargetedTherapyNodeCount,
          nonTargetedTherapyParticipantCount,
          radiotherapyNodeData,
          size(apoc.coll.toSet([r IN radiotherapyNodeData | r.radiological_procedure_record_id])) AS radiotherapyNodeCount,
          radiotherapyParticipantCount,
          surgeryNodeData,
          size(apoc.coll.toSet([s IN surgeryNodeData | s.surgical_procedure_record_id])) AS surgeryNodeCount,
          surgeryParticipantCount
      page_size: 1000
  - index_name: study_node_counts
    id_field: "short_name"
    mapping:
      keyword:
        - short_name
        - node_label
      long:
        - participant_count
        - total_node_count
    initial_query:
      query: |
        MATCH (study:study)<-[:belongs_to]-(p:participant)
        OPTIONAL MATCH (p)<-[:of_participant]-(diag:diagnosis)
        OPTIONAL MATCH (p)<-[:of_participant]-(spec:specimen)
        OPTIONAL MATCH (p)<-[:of_participant]-(demo:demographic)
        OPTIONAL MATCH (p)<-[:of_participant]-(exp:exposure)
        OPTIONAL MATCH (p)<-[:of_participant]-(surg:surgery)
        OPTIONAL MATCH (p)<-[:of_participant]-(tt:targeted_therapy)
        OPTIONAL MATCH (p)<-[:of_participant]-(nt:non_targeted_therapy)
        OPTIONAL MATCH (p)<-[:of_participant]-(rt:radiotherapy)
        WITH study,p,
          collect(DISTINCT diag) AS diags,
          collect(DISTINCT spec) AS specs,
          collect(DISTINCT demo) AS demos,
          collect(DISTINCT exp) AS exps,
          collect(DISTINCT surg) AS surgs,
          collect(DISTINCT tt) AS tts,
          collect(DISTINCT nt) AS nts,
          collect(DISTINCT rt) as rts
        WITH study,p,
          [
            {label: 'diagnosis', nodeCount: size(diags), participant: CASE WHEN size(diags) > 0 THEN p END},
            {label: 'specimen', nodeCount: size(specs), participant: CASE WHEN size(specs) > 0 THEN p END},
            {label: 'demographic', nodeCount: size(demos), participant: CASE WHEN size(demos) > 0 THEN p END},
            {label: 'exposure', nodeCount: size(exps), participant: CASE WHEN size(exps) > 0 THEN p END},
            {label: 'surgery', nodeCount: size(surgs), participant: CASE WHEN size(surgs) > 0 THEN p END},
            {label: 'radiotherapy', nodeCount: size(rts), participant: CASE WHEN size(rts) > 0 THEN p END},
            {label: 'targeted_therapy', nodeCount: size(tts), participant: CASE WHEN size(tts) > 0 THEN p END},
            {label: 'non_targeted_therapy', nodeCount: size(nts), participant: CASE WHEN size(nts) > 0 THEN p END}
          ] AS rows
        UNWIND rows AS row
        WITH row.label AS node_label,
            row.nodeCount AS node_count,
            row.participant AS participant,
            study
        RETURN
          study.study_short_name as short_name,
          node_label,
          count(DISTINCT participant) AS participant_count,
          sum(node_count) AS total_node_count
        ORDER BY participant_count DESC
      page_size: 10000
