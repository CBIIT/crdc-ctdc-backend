    cypher_query: "
      MATCH (study:study)
      OPTIONAL MATCH (study)<-[:belongs_to]-(p:participant)
      OPTIONAL MATCH (p)<-[:of_participant]-(diag:diagnosis)
      OPTIONAL MATCH (p)<-[:of_participant]-(demo:demographic)
      OPTIONAL MATCH (p)<-[:of_participant]-(rt:radiotherapy)
      OPTIONAL MATCH (p)<-[:of_participant]-(exp:exposure)
      OPTIONAL MATCH (p)<-[:of_participant]-(spec:specimen)
      OPTIONAL MATCH (p)<-[:of_participant]-(tt:targeted_therapy)
      OPTIONAL MATCH (p)<-[:of_participant]-(nt:non_targeted_therapy)
      OPTIONAL MATCH (p)<-[:of_participant]-(surg:surgery)
      WITH study,
        collect(DISTINCT {participant: p, diag: diag}) AS diag_data,
        collect(DISTINCT {participant: p, demo: demo}) AS demo_data,
        collect(DISTINCT {participant: p, rt: rt}) AS rt_data,
        collect(DISTINCT {participant: p, exp: exp}) AS exp_data,
        collect(DISTINCT {participant: p, spec: spec}) AS spec_data,
        collect(DISTINCT {participant: p, tt: tt}) AS tt_data,
        collect(DISTINCT {participant: p, nt: nt}) AS nt_data,
        collect(DISTINCT {participant: p, surg: surg}) AS surg_data
      // Group diagnoses and aggregate participant_ids per unique diagnosis
      WITH study, diag_data, demo_data, rt_data, exp_data, spec_data, tt_data, nt_data, surg_data,
           [d IN diag_data WHERE d.diag IS NOT NULL | {
             ctep_disease_term: d.diag.ctep_disease_term,
             date_of_diagnosis: d.diag.date_of_diagnosis,
             date_of_diagnosis_original: d.diag.date_of_diagnosis_original,
             date_of_diagnosis_unit: d.diag.date_of_diagnosis_unit,
             diagnosis_record_id: d.diag.diagnosis_record_id,
             histological_subtype: d.diag.histological_subtype,
             histology: d.diag.histology,
             meddra_disease_code: d.diag.meddra_disease_code,
             primary_diagnosis_disease_group: d.diag.primary_diagnosis_disease_group,
             primary_disease_site: d.diag.primary_disease_site,
             snomed_disease_code: d.diag.snomed_disease_code,
             snomed_disease_term: d.diag.snomed_disease_term,
             UUID: d.diag.UUID,
             participant_id: d.participant.participant_id
           }] AS flat_diags
      WITH study, demo_data, rt_data, exp_data, spec_data, tt_data, nt_data, surg_data,
           flat_diags,
           apoc.coll.toSet(flat_diags) AS unique_flat_diags
      WITH study, demo_data, rt_data, exp_data, spec_data, tt_data, nt_data, surg_data,
           [ud IN unique_flat_diags | {
             ctep_disease_term: ud.ctep_disease_term,
             date_of_diagnosis: ud.date_of_diagnosis,
             date_of_diagnosis_original: ud.date_of_diagnosis_original,
             date_of_diagnosis_unit: ud.date_of_diagnosis_unit,
             diagnosis_record_id: ud.diagnosis_record_id,
             histological_subtype: ud.histological_subtype,
             histology: ud.histology,
             meddra_disease_code: ud.meddra_disease_code,
             primary_diagnosis_disease_group: ud.primary_diagnosis_disease_group,
             primary_disease_site: ud.primary_disease_site,
             snomed_disease_code: ud.snomed_disease_code,
             snomed_disease_term: ud.snomed_disease_term,
             UUID: ud.UUID,
             participant_ids: [x IN flat_diags WHERE x.diagnosis_record_id = ud.diagnosis_record_id | x.participant_id]
           }] AS grouped_diags
      RETURN
        study.study_short_name AS study_short_name,
        [g IN grouped_diags | {
          participant_ids: apoc.coll.toSet(g.participant_ids),
          ctep_disease_term: g.ctep_disease_term,
          date_of_diagnosis: g.date_of_diagnosis,
          date_of_diagnosis_original: g.date_of_diagnosis_original,
          date_of_diagnosis_unit: g.date_of_diagnosis_unit,
          diagnosis_record_id: g.diagnosis_record_id,
          histological_subtype: g.histological_subtype,
          histology: g.histology,
          meddra_disease_code: g.meddra_disease_code,
          primary_diagnosis_disease_group: g.primary_diagnosis_disease_group,
          primary_disease_site: g.primary_disease_site,
          snomed_disease_code: g.snomed_disease_code,
          snomed_disease_term: g.snomed_disease_term,
          UUID: g.UUID
        }] AS diagnosis,
        size(apoc.coll.toSet([d IN flat_diags | d.participant_id])) AS diagnosis_participant_count,
        [d IN demo_data WHERE d.demo IS NOT NULL | {
          participant_ids: [d.participant.participant_id],
          age_at_enrollment: toString(d.demo.age_at_enrollment),
          age_at_enrollment_original: toString(d.demo.age_at_enrollment_original),
          age_at_enrollment_original_unit: d.demo.age_at_enrollment_original_unit,
          age_at_enrollment_unit: d.demo.age_at_enrollment_unit,
          body_surface_area: toString(d.demo.body_surface_area),
          body_surface_area_original: toString(d.demo.body_surface_area_original),
          body_surface_area_original_unit: d.demo.body_surface_area_original_unit,
          body_surface_area_unit: d.demo.body_surface_area_unit,
          demographic_record_id: d.demo.demographic_record_id,
          ethnicity: d.demo.ethnicity,
          height: toString(d.demo.height),
          height_original: toString(d.demo.height_original),
          height_original_unit: d.demo.height_original_unit,
          height_unit: d.demo.height_unit,
          ncbi_taxonomy_id: toString(d.demo.ncbi_taxonomy_id),
          ncbi_taxonomy_name: d.demo.ncbi_taxonomy_name,
          race: d.demo.race,
          sex: d.demo.sex,
          uuid: d.demo.uuid,
          weight: toString(d.demo.weight),
          weight_original: toString(d.demo.weight_original),
          weight_original_unit: d.demo.weight_original_unit,
          weight_unit: d.demo.weight_unit
        }] AS demographic,
        size([d IN demo_data WHERE d.demo IS NOT NULL | d.participant.participant_id]) AS demographic_participant_count,
        [r IN rt_data WHERE r.rt IS NOT NULL | {
          participant_ids: [r.participant.participant_id],
          radiation_dose: r.rt.radiation_dose,
          radiation_extent: r.rt.radiation_extent,
          radiation_frequency: r.rt.radiation_frequency,
          radiological_procedure: r.rt.radiological_procedure,
          radiological_procedure_anatomical_location: r.rt.radiological_procedure_anatomical_location,
          radiological_procedure_record_id: r.rt.radiological_procedure_record_id,
          uuid: r.rt.uuid
        }] AS radiotherapy,
        size([r IN rt_data WHERE r.rt IS NOT NULL | r.participant.participant_id]) AS radiotherapy_participant_count,
        // Exposure entries with DISTINCT participant_ids
        [g IN apoc.coll.toSet([e IN exp_data WHERE e.exp IS NOT NULL | {
          exposure_record_id: e.exp.exposure_record_id,
          carcinogen_exposure: e.exp.carcinogen_exposure,
          participant_id: e.participant.participant_id
        }]) | {
          exposure_record_id: g.exposure_record_id,
          carcinogen_exposure: g.carcinogen_exposure,
          participant_ids: apoc.coll.toSet([x IN exp_data WHERE x.exp IS NOT NULL AND x.exp.exposure_record_id = g.exposure_record_id | x.participant.participant_id])
        }] AS exposure,
        size(apoc.coll.toSet([e IN exp_data WHERE e.exp IS NOT NULL | e.participant.participant_id])) AS exposure_participant_count,
        [g IN apoc.coll.toSet([s IN spec_data WHERE s.spec IS NOT NULL | {
          specimen_record_id: s.spec.specimen_record_id,
          anatomical_collection_site: s.spec.anatomical_collection_site,
          assessment_timepoint: s.spec.assessment_timepoint,
          collection_date: toString(s.spec.collection_date),
          collection_date_original: toString(s.spec.collection_date_original),
          collection_date_original_unit: s.spec.collection_date_original_unit,
          collection_date_unit: s.spec.collection_date_unit,
          crdc_id: s.spec.crdc_id,
          created: s.spec.created,
          specimen_category: s.spec.specimen_category,
          specimen_type_concept_code: s.spec.specimen_type_concept_code,
          tissue_category: s.spec.tissue_category,
          participant_id: s.participant.participant_id
        }]) | {
          specimen_record_id: g.specimen_record_id,
          anatomical_collection_site: g.anatomical_collection_site,
          assessment_timepoint: g.assessment_timepoint,
          collection_date: g.collection_date,
          collection_date_original: g.collection_date_original,
          collection_date_original_unit: g.collection_date_original_unit,
          collection_date_unit: g.collection_date_unit,
          crdc_id: g.crdc_id,
          created: g.created,
          specimen_category: g.specimen_category,
          specimen_type_concept_code: g.specimen_type_concept_code,
          tissue_category: g.tissue_category,
          participant_ids: apoc.coll.toSet([x IN spec_data WHERE x.spec IS NOT NULL AND x.spec.specimen_record_id = g.specimen_record_id | x.participant.participant_id])
        }] AS specimen,
        size(apoc.coll.toSet([s IN spec_data WHERE s.spec IS NOT NULL | s.participant.participant_id])) AS specimen_participant_count,
        [g IN apoc.coll.toSet([t IN tt_data WHERE t.tt IS NOT NULL | {
          targeted_therapy_record_id: t.tt.targeted_therapy_record_id,
          targeted_therapy: t.tt.targeted_therapy,
          targeted_therapy_dose: t.tt.targeted_therapy_dose,
          targeted_therapy_frequency: t.tt.targeted_therapy_frequency,
          participant_id: t.participant.participant_id
        }]) | {
          targeted_therapy_record_id: g.targeted_therapy_record_id,
          targeted_therapy: g.targeted_therapy,
          targeted_therapy_dose: g.targeted_therapy_dose,
          targeted_therapy_frequency: g.targeted_therapy_frequency,
          participant_ids: apoc.coll.toSet([x IN tt_data WHERE x.tt IS NOT NULL AND x.tt.targeted_therapy_record_id = g.targeted_therapy_record_id | x.participant.participant_id])
        }] AS targeted_therapy,
        size(apoc.coll.toSet([t IN tt_data WHERE t.tt IS NOT NULL | t.participant.participant_id])) AS targeted_therapy_participant_count,
        [n IN nt_data WHERE n.nt IS NOT NULL | {
          participant_ids: [n.participant.participant_id],
          non_targeted_therapy_record_id: n.nt.non_targeted_therapy_record_id,
          best_response_to_non_targeted_therapy: n.nt.best_response_to_non_targeted_therapy,
          non_targeted_therapy: n.nt.non_targeted_therapy,
          non_targeted_therapy_dose: n.nt.non_targeted_therapy_dose,
          non_targeted_therapy_frequency: n.nt.non_targeted_therapy_frequency
        }] AS non_targeted_therapy,
        size([n IN nt_data WHERE n.nt IS NOT NULL | n.participant.participant_id]) AS non_targeted_therapy_participant_count,
        [g IN apoc.coll.toSet([s IN surg_data WHERE s.surg IS NOT NULL | {
          surgical_procedure_record_id: s.surg.surgical_procedure_record_id,
          extent_of_residual_disease: s.surg.extent_of_residual_disease,
          surgical_procedure: s.surg.surgical_procedure,
          surgical_procedure_anatomical_location: s.surg.surgical_procedure_anatomical_location,
          surgical_procedure_date: toString(s.surg.surgical_procedure_date),
          surgical_procedure_findings: s.surg.surgical_procedure_findings,
          surgical_procedure_therapeutic: s.surg.surgical_procedure_therapeutic,
          participant_id: s.participant.participant_id
        }]) | {
          surgical_procedure_record_id: g.surgical_procedure_record_id,
          extent_of_residual_disease: g.extent_of_residual_disease,
          surgical_procedure: g.surgical_procedure,
          surgical_procedure_anatomical_location: g.surgical_procedure_anatomical_location,
          surgical_procedure_date: g.surgical_procedure_date,
          surgical_procedure_findings: g.surgical_procedure_findings,
          surgical_procedure_therapeutic: g.surgical_procedure_therapeutic,
          participant_ids: apoc.coll.toSet([x IN surg_data WHERE x.surg IS NOT NULL AND x.surg.surgical_procedure_record_id = g.surgical_procedure_record_id | x.participant.participant_id])
        }] AS surgery,
        size(apoc.coll.toSet([s IN surg_data WHERE s.surg IS NOT NULL | s.participant.participant_id])) AS surgery_participant_count
      "
