        - demographicNodeData.weight_original
        - demographicNodeData.weight_original_unit
        - demographicNodeData.weight_unit
        - demographicNodeData.occupation
        - demographicNodeData.income
        - demographicNodeData.highest_level_of_education
        - exposureNodeData.participant_ids
        - exposureNodeData.carcinogen_exposure
        - exposureNodeData.exposure_record_id
        - specimenNodeData.participant_ids
        - specimenNodeData.anatomical_collection_site
        - specimenNodeData.assessment_timepoint
        - specimenNodeData.collection_date
        - specimenNodeData.collection_date_original
        - specimenNodeData.collection_date_original_unit
        - specimenNodeData.collection_date_unit
        - specimenNodeData.crdc_id
        - specimenNodeData.created
        - specimenNodeData.specimen_category
        - specimenNodeData.specimen_record_id
        - specimenNodeData.specimen_type_concept_code
        - specimenNodeData.tissue_category
      long:
        - diagnosisNodeCount
        - diagnosisParticipantCount
        - demographicNodeCount
        - demographicParticipantCount
        - exposureNodeCount
        - exposureParticipantCount
        - specimenNodeCount
        - specimenParticipantCount
    initial_query:
      query: |
        MATCH (study:study)<-[:belongs_to]-(p:participant)
        WITH study, COLLECT(DISTINCT p.participant_id) AS all_participant_ids
        OPTIONAL MATCH (study)<-[:belongs_to]-(p_diag:participant)
        OPTIONAL MATCH (p_diag)<-[:of_participant]-(diag:diagnosis)
        WITH study, all_participant_ids,
          COLLECT({node: diag, participant_id: p_diag.participant_id}) AS diag_data
        OPTIONAL MATCH (study)<-[:belongs_to]-(p_demo:participant)
        OPTIONAL MATCH (p_demo)<-[:of_participant]-(demo:demographic)
        WITH study, all_participant_ids, diag_data,
          COLLECT({node: demo, participant_id: p_demo.participant_id}) AS demo_data
        OPTIONAL MATCH (study)<-[:belongs_to]-(p_exp:participant)
        OPTIONAL MATCH (p_exp)<-[:of_participant]-(exp:exposure)
        WITH study, all_participant_ids, diag_data, demo_data,
          COLLECT({node: exp, participant_id: p_exp.participant_id}) AS exp_data
        OPTIONAL MATCH (study)<-[:belongs_to]-(p_spec:participant)
        OPTIONAL MATCH (p_spec)<-[:of_participant]-(spec:specimen)
        WITH study, all_participant_ids, diag_data, demo_data, exp_data,
          COLLECT({node: spec, participant_id: p_spec.participant_id}) AS spec_data
        WITH study, all_participant_ids,
          apoc.coll.toSet([x IN diag_data WHERE x.node IS NOT NULL | x.node]) AS unique_diag,
          diag_data,
          apoc.coll.toSet([x IN demo_data WHERE x.node IS NOT NULL | x.node]) AS unique_demo,
          demo_data,
          apoc.coll.toSet([x IN exp_data WHERE x.node IS NOT NULL | x.node]) AS unique_exp,
          exp_data,
          apoc.coll.toSet([x IN spec_data WHERE x.node IS NOT NULL | x.node]) AS unique_spec,
          spec_data
        WITH study,
          [d IN unique_diag | {
            participant_ids: apoc.text.join([x IN diag_data WHERE x.node = d AND x.participant_id IS NOT NULL | x.participant_id], '|'),
            ctep_disease_term: d.ctep_disease_term,
            date_of_diagnosis: d.date_of_diagnosis,
            date_of_diagnosis_original: d.date_of_diagnosis_original,
            date_of_diagnosis_unit: d.date_of_diagnosis_unit,
            diagnosis_record_id: d.diagnosis_record_id,
            histological_subtype: d.histological_subtype,
            histology: d.histology,
            meddra_disease_code: d.meddra_disease_code,
            primary_diagnosis_disease_group: d.primary_diagnosis_disease_group,
            primary_disease_site: d.primary_disease_site,
            snomed_disease_code: d.snomed_disease_code,
            snomed_disease_term: d.snomed_disease_term,
            UUID: d.uuid
          }] AS diagnosisNodeData,
          size(apoc.coll.toSet([x IN diag_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id])) AS diagnosisNodeCount,
          [dm IN unique_demo | {
            participant_ids: apoc.text.join([x IN demo_data WHERE x.node = dm AND x.participant_id IS NOT NULL | x.participant_id], '|'),
            age_at_enrollment: dm.age_at_enrollment,
            age_at_enrollment_original: dm.age_at_enrollment_original,
            age_at_enrollment_original_unit: dm.age_at_enrollment_original_unit,
            age_at_enrollment_unit: dm.age_at_enrollment_unit,
            body_surface_area: dm.body_surface_area,
            body_surface_area_original: dm.body_surface_area.original,
            body_surface_area_original_unit: dm.body_surface_area_original_unit,
            body_surface_area_unit: dm.body_surface_area.unit,
            demographic_record_id: dm.demographic_record_id,
            ethnicity: dm.ethnicity,
            height: dm.height,
            height_original: dm.height_original,
            height_original_unit: dm.height_original_unit,
            height_unit: dm.height_unit,
            ncbi_taxonomy_id: dm.ncbi_taxonomy_id,
            ncbi_taxonomy_name: dm.ncbi_taxonomy_name,
            race: dm.race,
            sex: dm.sex,
            uuid: dm.uuid,
            weight: dm.weight,
            weight_original: dm.weight_original,
            weight_original_unit: dm.weight_original.unit,
            weight_unit: dm.weight.unit,
            occupation: dm.occupation,
            income: dm.income,
            highest_level_of_education: dm.highest_level_of_education
          }] AS demographicNodeData,
          size(apoc.coll.toSet([x IN demo_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id])) AS demographicParticipantCount,
          [e IN unique_exp | {
            participant_ids: apoc.text.join([x IN exp_data WHERE x.node = e AND x.participant_id IS NOT NULL | x.participant_id], '|'),
            carcinogen_exposure: e.carcinogen_exposure,
            exposure_record_id: e.exposure_record_id
          }] AS exposureNodeData,
          size(apoc.coll.toSet([x IN exp_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id])) AS exposureParticipantCount,
          [s IN unique_spec | {
            participant_ids: apoc.text.join([x IN spec_data WHERE x.node = s AND x.participant_id IS NOT NULL | x.participant_id], '|'),
            anatomical_collection_site: s.anatomical_collection_site,
            assessment_timepoint: toString(s.assessment_timepoint),
            collection_date: toString(s.collection_date),
            collection_date_original: toString(s.collection_date_original),
            collection_date_original_unit: s.collection_date_original_unit,
            collection_date_unit: toString(s.collection_date_unit),
            crdc_id: s.crdc_id,
            created: toString(s.created),
            specimen_category: s.specimen_category,
            specimen_record_id: s.specimen_record_id,
            specimen_type_concept_code: s.specimen_type_concept_code,
            tissue_category: s.tissue_category
          }] AS specimenNodeData,
          size(apoc.coll.toSet([x IN spec_data WHERE x.node IS NOT NULL AND x.participant_id IS NOT NULL | x.participant_id])) AS specimenParticipantCount,
          ['diagnosis','demographic','exposure','specimen'] AS unique_node_types
        RETURN
          study.study_short_name AS study_short_name,
          unique_node_types,
          diagnosisNodeData,
          size(apoc.coll.toSet([d IN diagnosisNodeData | d.diagnosis_record_id])) AS diagnosisNodeCount,
          diagnosisParticipantCount,
          demographicNodeData,
          size(apoc.coll.toSet([d IN demographicNodeData | d.demographic_record_id])) AS demographicNodeCount,
          demographicParticipantCount,
          exposureNodeData,
          size(apoc.coll.toSet([e IN exposureNodeData | e.exposure_record_id])) AS exposureNodeCount,
          exposureParticipantCount,
          specimenNodeData,
          size(apoc.coll.toSet([s IN specimenNodeData | s.specimen_record_id])) AS specimenNodeCount,
          specimenParticipantCount
      page_size: 1000
