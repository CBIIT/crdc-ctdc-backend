  # # About Page index
  - index_name: about_page
    type: about_file
    mapping:
      keyword:
        - primaryContentImage
      search_as_you_type:
        - page
        - title
        - content.paragraph
        - content.listWithBullets
  # Model nodes index
  - index_name: model_nodes
    type: model
    subtype: node
    mapping:
      keyword:
        - node_kw
      search_as_you_type:
        - node
  # Model properties index
  - index_name: model_properties
    type: model
    subtype: property
    mapping:
      keyword:
